name: Build & Check

on:
  pull_request:
    types:
      - labeled
      - edited
      - synchronize
      - unlabeled
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 48b55a0 (https://github.com/actions/setup-node/releases/tag/v6.4.0)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2 (https://github.com/actions/checkout/releases/tag/v6.0.2)
      - run: npx -y prettier --check ./
      # Uncomment the line below to include shell script linting
      # - run: npx -y shellcheck ./.github/scripts/*.sh ./src/scripts/*.sh

  step_summary_meta:
    runs-on: ubuntu-latest
    steps:
      - run: |
          PUSH=${{ contains(github.event.pull_request.labels.*.name, 'canary') }}

          if [ "${PUSH}" = "true" ]; then
            echo "## Image Published!" >> $GITHUB_STEP_SUMMARY
            echo "> These are development images, expect bugs!!"
          fi

  build_rust:
    name: Build Rust
    uses: mbround18/gh-reusable/.github/workflows/rust-build-n-test.yml@main

  build_docker:
    name: "Build Docker"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image: [odin, valheim]
        include:
          - image: odin
            push: true
          - image: valheim
            push: ${{ contains(github.event.pull_request.labels.*.name, 'canary') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2 (https://github.com/actions/checkout/releases/tag/v6.0.2)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # 4d04d5d (https://github.com/docker/setup-buildx-action/releases/tag/v4.0.0)

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # 4907a6d (https://github.com/docker/login-action/releases/tag/v4.1.0)
        with:
          username: mbround18
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # 030e881 (https://github.com/docker/metadata-action/releases/tag/v6.0.0)
        with:
          images: |
            mbround18/${{ matrix.image }}
          tags: |
            type=sha

      - name: Build ${{ matrix.image }}
        id: docker_build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # bcafcac (https://github.com/docker/build-push-action/releases/tag/v7.1.0)
        with:
          file: ./Dockerfile
          target: ${{ matrix.image }}
          push: ${{ matrix.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=mbround18/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=mbround18/${{ matrix.image }}:buildcache,mode=max
          build-args: |
            "GITHUB_SHA=${GITHUB_SHA}"
            "GITHUB_REF=${GITHUB_REF}"
            "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
            "ODIN_IMAGE_VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}"

      - name: Publish Image Summary
        if: matrix.push
        run: |
          {
            echo "\`\`\`";
            if [ "${{ matrix.image }}" = "odin" ]; then
              echo "docker run ${{ steps.meta.outputs.tags }}";
            else
              echo "docker run --rm -it \\";
              echo "  -e PASSWORD=\"123abc\" \\";
              echo "  -e PUBLIC=\"1\" \\";
              echo "  ${{ steps.meta.outputs.tags }}";
            fi;
            echo "\`\`\`";
          } >> $GITHUB_STEP_SUMMARY
